<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球时间</title>
<script src="lib/d3.v7.min.js"></script>
<script src="lib/d3-geo-projection.min.js"></script>
<script src="lib/topojson-client.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #222;
  height: 100vh;
  overflow: hidden;
}
.app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
.header {
  background: #fff;
  border-bottom: 1px solid #e4e6e8;
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.header-title { font-size: 18px; font-weight: 700; color: #1a1a1a; letter-spacing: -.3px; }

/* Settings button – gray circle + */
.add-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid #bbb;
  background: transparent;
  color: #aaa;
  font-size: 20px; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, color .2s, transform .25s;
  padding-bottom: 1px; font-weight: 300;
}
.add-btn:hover { border-color: #888; color: #666; transform: rotate(90deg); }

/* ── Tabs ── */
.tabs {
  display: flex; align-items: center; background: #fff;
  border-bottom: 1px solid #e4e6e8;
  padding: 0 20px; flex-shrink: 0;
}
#localClock {
  margin-left: auto;
  font-size: 13px; color: #555; white-space: nowrap;
  padding-right: 4px;
}
.tab-btn {
  padding: 11px 16px; background: none; border: none;
  border-bottom: 2px solid transparent;
  color: #888; font-size: 14px; cursor: pointer;
  transition: all .18s; margin-bottom: -1px;
}
.tab-btn:hover { color: #444; }
.tab-btn.active { color: #ff6b35; border-bottom-color: #ff6b35; font-weight: 600; }

/* ── Content ── */
.content { flex: 1; overflow: hidden; position: relative; }
.panel { display: none; width: 100%; height: 100%; }
.panel.active { display: block; }
#mapPanel:not(.active) { display: none; }
#mapPanel.active { display: flex; }

/* ── Map ── */
/* Light gray for non-projection area */
#mapPanel {
  background: #e8eaed;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
#mapPanel svg {
  display: block;
  width: 100%;
  height: 100%;
}

.ocean      { fill: #c0daf0; }
.land       { fill: #d0d0d0; stroke: none; }
.polar-land { fill: #f0f2f4; stroke: #bbc; stroke-width: 0.4; }
.tz-line { fill: none; stroke: #90b8d0; stroke-width: 0.5; opacity: .5; }
.graticule { fill: none; stroke: #b0d0e8; stroke-width: 0.3; opacity: .4; }

/* Special geographic lines */
.equator    { fill: none; stroke: #5080b0; stroke-width: 1; opacity: .55; stroke-dasharray: none; }
.tropic     { fill: none; stroke: #8090b0; stroke-width: 0.7; opacity: .45; stroke-dasharray: 4 3; }
.geo-line-label { font-size: 8.5px; fill: #4a6a9a; opacity: .75; dominant-baseline: middle; pointer-events: none; font-style: italic; }
.geo-line-date  { font-size: 6.5px; }
.date-line      { fill: none; stroke: #555; stroke-width: 1.2; opacity: .85; }
.date-label     { font-size: 9px; font-weight: 400; fill: #555; opacity: .85; dominant-baseline: middle; pointer-events: none; }
.midnight-line  { fill: none; stroke: #3a5fa0; stroke-width: 0.8; opacity: .90; stroke-dasharray: 5 3; }
.midnight-label { font-size: 9px; font-weight: 400; fill: #3a5fa0; opacity: .90; dominant-baseline: middle; pointer-events: none; }



.city-dot        { fill: #ff6b35; stroke: #fff; stroke-width: 0.8; }
.city-dot-bg     { fill: #999; opacity: .6; pointer-events: none; }
.moon-track-past-dot   { pointer-events: none; }
.moon-track-future-dot { pointer-events: none; }
.city-leader     { stroke: #ff6b35; stroke-width: 0.9; opacity: 0.55; fill: none; }
.city-name-lbl   { font-size: 9px; fill: #1a1a1a; font-weight: 400; }
.city-time-lbl   { font-size: 8px; fill: #444;   font-weight: 400; }

/* Projection switcher */
#projSwitcher {
  position: absolute; right: 12px; bottom: 12px;
  display: flex; gap: 4px; z-index: 10;
}
.proj-btn {
  padding: 4px 9px;
  border: 1px solid #bbb;
  border-radius: 4px;
  background: rgba(255,255,255,.72);
  color: #777; font-size: 11px; cursor: pointer;
  transition: all .15s;
  backdrop-filter: blur(4px);
}
.proj-btn:hover { background: rgba(255,255,255,.92); color: #444; }
.proj-btn.active { background: rgba(255,255,255,.92); color: #333; border-color: #999; font-weight: 600; }
.proj-sep { width: 1px; background: #ccc; align-self: stretch; margin: 2px 2px; }
.proj-label { font-size: 11px; color: #888; align-self: center; white-space: nowrap; padding: 0 2px; }

/* ── Clock Panel ── */
#clockPanel {
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f5;
  overflow: auto;
}
#worldClock {
  display: block;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  margin: auto;
}

/* ── Timeline ── */
#timelinePanel {
  background: #f0f2f5;
  overflow-y: auto; overflow-x: hidden;
  padding: 20px 20px 12px;
}
.tl-row      { display: flex; align-items: center; margin-bottom: 14px; }
.tl-city     { width: 120px; min-width: 120px; padding-right: 14px;
               display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
.tl-city-text{ text-align: right; }
.tl-city-name{ font-size: 13px; font-weight: 600; color: #222; white-space: nowrap; }
.tl-utc      { font-size: 11px; color: #888; margin-top: 1px; }
.tl-pin-btn  { background: none; border: none; cursor: pointer; padding: 1px 0;
               font-size: 14px; line-height: 1; color: #ccc; flex-shrink: 0;
               transition: color .15s, transform .2s; }
.tl-pin-btn:hover          { color: #ffaa44; transform: scale(1.2); }
.tl-pin-btn.pinned         { color: #ff6b35; }
.tl-row.tl-pinned          { background: rgba(255,107,53,.05); border-radius: 6px; }
.tl-sep {
  margin: 2px 0 14px 120px; height: 1px; background: #dde0e4;
  position: relative;
}
.tl-sep::after {
  content: attr(data-label); position: absolute; right: 0; top: -9px;
  font-size: 10px; color: #bbb; background: #f0f2f5; padding-left: 6px;
}
.tl-track {
  flex: 1; position: relative; height: 34px;
  border-radius: 4px; overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.12);
}
.tl-track-bg { position: absolute; inset: 0; }
.tl-day-sep  {
  position: absolute; top: 0; bottom: 0; width: 3px;
  background: rgba(255,255,255,.45); z-index: 1;
}
.tl-day-label {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 10px; font-weight: 400; letter-spacing: .2px;
  z-index: 5; pointer-events: none; white-space: nowrap;
}
.tl-now-line {
  position: absolute; left: 50%; top: -2px; bottom: -2px;
  width: 2px; transform: translateX(-50%);
  background: #ff6b35; z-index: 4; border-radius: 1px;
}

/* ── Collab bar ── */
.collab-summary-card {
  margin-left: 134px; margin-bottom: 20px;
  background: #fff; border-radius: 6px;
  padding: 8px 14px;
  font-size: 12px; color: #444; line-height: 2;
  box-shadow: 0 1px 3px rgba(0,0,0,.09);
  border-left: 3px solid #4caf50;
}
.collab-summary-card.no-overlap { border-left-color: #ef9a9a; }
.collab-summary-card.partial    { border-left-color: #ffc107; }
.collab-chip {
  display: inline-block; background: #e8f5e9; color: #1a7a2a;
  border-radius: 4px; padding: 0 8px; font-weight: 600; margin: 0 3px;
}
.collab-legend {
  margin-top: 2px; display: flex; gap: 14px; font-size: 11px; color: #999;
}
.collab-ld { display: inline-block; width: 12px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.28); z-index: 800;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border-radius: 14px;
  width: 92%; max-width: 500px; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 12px 40px rgba(0,0,0,.18);
}
.modal-head {
  padding: 16px 20px 12px; border-bottom: 1px solid #eee; flex-shrink: 0;
}
.modal-title { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
.selected-chips { display: flex; flex-wrap: wrap; gap: 5px; min-height: 26px; }
.city-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: #fff3ee; border: 1px solid #ffb89a; border-radius: 20px;
  padding: 2px 8px 2px 8px; font-size: 11px; color: #c04010; cursor: pointer;
  transition: background .12s;
}
.city-chip:hover { background: #ffe0d0; }
.chip-x { font-size: 13px; margin-left: 1px; opacity: .6; }
.modal-body { flex: 1; overflow-y: auto; }
.continent-hd {
  padding: 8px 16px 4px; font-size: 12px; font-weight: 700;
  color: #fff; background: #888; letter-spacing: .5px;
  position: sticky; top: 0; z-index: 2;
}
.country-hd {
  padding: 5px 16px 2px 24px; font-size: 11px; font-weight: 600;
  color: #888; background: #f8f8f8; border-bottom: 1px solid #f0f0f0;
}
.city-row {
  display: flex; align-items: center;
  padding: 9px 16px 9px 32px; cursor: pointer;
  border-bottom: 1px solid #f5f5f5; gap: 8px;
}
.city-row:hover { background: #fafafa; }
.city-row.sel { background: #fff6f2; }
.city-check { width: 16px; color: #ff6b35; font-size: 13px; flex-shrink: 0; }
.city-name { flex: 1; font-size: 13px; color: #222; }
.city-utc { font-size: 11px; color: #bbb; }
.modal-foot {
  padding: 10px 20px; border-top: 1px solid #eee;
  display: flex; justify-content: flex-end; flex-shrink: 0;
}
.btn-done { padding: 7px 22px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
.btn-done:hover { background: #e85e28; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* ── Comparison Table ── */
#compPanel {
  overflow: auto;
  background: #e8ecf1;
}
.comp-wrap {
  padding: 12px 14px 16px;
}
.comp-table {
  border-collapse: collapse;
  table-layout: fixed;
  border-radius: 10px;
  box-shadow: 0 2px 14px rgba(0,0,0,.13);
}
/* Sticky city column */
.comp-table th.ct-city-col,
.comp-table td.ct-city-col {
  position: sticky; left: 0; z-index: 6;
  width: 100px; min-width: 100px;
  background: #c8cdd6;
  border-right: 1px solid rgba(0,0,0,.08);
  white-space: nowrap;
}
.comp-table thead th.ct-city-col {
  border-radius: 10px 0 0 0;
  text-align: left; padding: 10px 8px 8px;
  font-size: 12px; font-weight: 700; color: #1a2535;
  z-index: 11;
}
.comp-table td.ct-city-col {
  height: 34px; padding: 0; vertical-align: middle;
  background: #d2d5dc;
}
.ct-city-cell {
  display: flex; align-items: center; gap: 2px;
  padding: 0 6px 0 1px;
}
/* Hour header columns */
.comp-table thead th:not(.ct-city-col) {
  position: sticky; top: 0; z-index: 5;
  background: #c8cdd6;
  padding: 10px 0 8px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,.08);
  width: 52px; min-width: 52px;
  font-size: 11px; font-weight: 600; color: #404858;
  white-space: nowrap;
}
.comp-table thead th:last-child { border-radius: 0 10px 0 0; }
.th-city { font-size: 12.5px; font-weight: 700; color: #1a2535; line-height: 1.25; }
.th-utc  { font-size: 9.5px;  color: #606878;  font-weight: 400; margin-top: 2px; line-height: 1; }
/* Time cells */
.comp-table td:not(.ct-city-col) {
  height: 34px; padding: 0 2px;
  text-align: center; vertical-align: middle;
  border-bottom: 1px solid rgba(0,0,0,.03);
}
.comp-table tbody tr:last-child td.ct-city-col { border-radius: 0 0 0 10px; }
.comp-table tbody tr:last-child td:last-child   { border-radius: 0 0 10px 0; }
.ct-time {
  font-variant-numeric: tabular-nums;
  font-size: 12px; font-weight: 500;
  letter-spacing: .15px;
}
.ct-badge {
  font-size: 7.5px; font-weight: 700;
  margin-left: 1px; vertical-align: super; line-height: 1; opacity: .80;
}
.ct-badge-plus  { color: #cc2020; }
.ct-badge-minus { color: #1870c0; }
/* Current column highlight */
td.ct-now-col {
  box-shadow: inset 2px 0 0 #ff6b35, inset -2px 0 0 #ff6b35;
  background-image: linear-gradient(rgba(255,107,53,.13), rgba(255,107,53,.13));
}
th.ct-now-col { color: #c04010 !important; }
/* Pinned city rows */
tr.ct-pinned td.ct-city-col { background: rgba(255,107,53,.10) !important; }
/* Separator row between pinned / unpinned */
tr.ct-sep-row td {
  height: 6px; padding: 0;
  background: linear-gradient(to right, #c0c5cf 100px, #dde0e4 100px);
}

@media (max-width: 600px) {
  .header { padding: 0 14px; }
  .tabs { padding: 0 12px; }
  #timelinePanel { padding: 14px 12px; }
  .tl-city { width: 88px; min-width: 88px; padding-right: 10px; }
  .tl-city-name { font-size: 12px; }
  .tl-utc { font-size: 10px; }
  .tl-bars { height: 28px; gap: 1px; }
  .tl-bar-label { font-size: 9px; }
  #projSwitcher { right: 8px; bottom: 8px; }
  .comp-wrap { padding: 7px 8px 10px; }
  .comp-table th.ct-city-col, .comp-table td.ct-city-col { width: 80px; min-width: 80px; }
  .comp-table thead th:not(.ct-city-col) { width: 44px; min-width: 44px; padding: 7px 0 5px; }
  .th-city { font-size: 10.5px; }
  .th-utc  { font-size: 8.5px; }
  .comp-table td:not(.ct-city-col), .comp-table td.ct-city-col { height: 28px; }
  .ct-time { font-size: 10.5px; }
}

/* ── Wallpaper mode (?wallpaper=1) ── */
body.wallpaper .header,
body.wallpaper .tabs      { display: none !important; }
body.wallpaper .content   { height: 100vh; }
body.wallpaper #mapPanel  { background: #c8e0f0; }   /* ocean blue, no grey bars at edges */

#wpclock {
  display: none;
  position: absolute;
  right: 32px; top: 48px;
  text-align: right;
  pointer-events: none;
  z-index: 20;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}
body.wallpaper #wpclock { display: block; }
#wp-tips {
  display: none;
  position: absolute;
  right: 16px; bottom: 16px;
  font-size: 11px;
  color: rgba(255,255,255,.45);
  text-shadow: 0 1px 4px rgba(0,0,0,.40);
  pointer-events: none;
  z-index: 20;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  letter-spacing: .2px;
}
/* #wp-tips hidden in wallpaper mode */
#wpclock-time {
  font-size: 60px; font-weight: 200;
  color: rgba(255,255,255,.90);
  letter-spacing: -2px; line-height: 1;
  text-shadow: 0 2px 16px rgba(0,0,0,.40);
}
#wpclock-date {
  font-size: 15px; font-weight: 400;
  color: rgba(255,255,255,.72);
  margin-top: 8px; letter-spacing: .2px;
  text-shadow: 0 1px 8px rgba(0,0,0,.40);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">全球时间</div>
    <button class="add-btn" id="settingsBtn" title="选择城市">+</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-panel="mapPanel">世界地图</button>
    <button class="tab-btn" data-panel="timelinePanel">时间轴</button>
    <button class="tab-btn" data-panel="compPanel">对照表</button>
    <button class="tab-btn" data-panel="clockPanel">Clock</button>
    <span id="localClock"></span>
  </div>
  <div class="content">
    <div id="mapPanel" class="panel active">
      <svg id="mapSvg" viewBox="0 0 960 540" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="wpclock"><div id="wpclock-time"></div><div id="wpclock-date"></div></div>
      <div id="wp-tips">在 Safari 访问 localhost:8765 可修改设置</div>
      <div id="projSwitcher">
        <button class="proj-btn active" data-proj="naturalEarth">Natural Earth</button>
        <button class="proj-btn" data-proj="braun">Braun</button>
        <span class="proj-sep"></span>
        <span class="proj-label">晨昏线</span>
        <button class="proj-btn term-btn" data-term="simple">简单过渡</button>
        <button class="proj-btn term-btn active" data-term="natural">自然过渡</button>
        <span class="proj-sep"></span>
        <button class="proj-btn" id="wpCityBtn">城市列表</button>
      </div>
    </div>
    <div id="timelinePanel" class="panel"></div>
    <div id="compPanel" class="panel"><div class="comp-wrap"><table class="comp-table"><thead></thead><tbody></tbody></table></div></div>
    <div id="clockPanel" class="panel"><canvas id="worldClock" width="620" height="620"></canvas></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">城市选择</div>
      <div class="selected-chips" id="selectedChips"></div>
    </div>
    <div class="modal-body" id="cityList"></div>
    <div class="modal-foot">
      <button class="btn-done" id="modalDone">完成</button>
    </div>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
